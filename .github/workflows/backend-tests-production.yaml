name: Run Backend Tests on merge into main

on:
  push:
    branches:
      - main  # Trigger on merges to the main branch
    paths:
      - 'src/backend/**'  # Only trigger if there are changes in the backend directory

jobs:
  run_tests:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Google Cloud credentials
      - name: Set up Google Cloud credentials
        run: echo "${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}" > ${HOME}/gcloud_key.json

      # Step 3: Set GOOGLE_APPLICATION_CREDENTIALS environment variable
      - name: Set GOOGLE_APPLICATION_CREDENTIALS
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS="${HOME}/gcloud_key.json"
        env:
          GOOGLE_APPLICATION_CREDENTIALS: "${HOME}/gcloud_key.json"

      # Step 4: Set up Python environment and install dependencies
      - name: Set up Python environment
        run: |
          cd src/backend
          pip install -r requirements.txt

      # Step 5: Start the backend (app.py) in the background
      - name: Run backend
        run: |
          cd src/backend
          python3 app.py &  # Run app.py in the background

      # Step 6: Run the backend tests with TEST_ENV_URL set to production URL
      - name: Run backend tests
        env:
          TEST_ENV_URL: "https://deckhub-backend-1086653848406.us-central1.run.app"  # Production backend URL
          GOOGLE_APPLICATION_CREDENTIALS: "${HOME}/gcloud_key.json"
        run: |
          cd src/backend
          python3 -m unittest discover -s test -p "test_session.py"
