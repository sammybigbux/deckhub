name: Deploy to staging on merge into staging branch

on:
  push:
    branches:
      - staging  # Only triggers on pushes to the staging branch

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install dependencies and build the frontend
      - name: Install dependencies and build frontend
        run: npm ci && npm run build

      # Step 3: Authenticate with Google Cloud (using service account from GOOGLE_APPLICATION_CREDENTIALS)
      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}  # Google Cloud service account key

      # Step 4: Deploy frontend to Firebase Hosting (staging)
      - name: Deploy frontend to Firebase Hosting (staging)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}  # GitHub token to authenticate with Firebase Hosting
          firebaseServiceAccount: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}  # Use the same service account key for Firebase Hosting
          projectId: deckhubapp  # Firebase project ID
          channelId: staging  # Deploy to the staging channel

      # Step 5: Verify Google Cloud Authentication
      - name: Verify Google Cloud Authentication
        run: |
          gcloud config list project

      # Step 6: Set up Google Cloud SDK for Cloud Run
      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: deckhubapp  # Google Cloud project ID

      # Step 7: Authenticate Docker with GCR
      - name: Authenticate Docker with GCR
        run: gcloud auth configure-docker

      # Step 8: Build Docker image for backend (correct path to the Dockerfile)
      - name: Build Docker image for backend
        run: |
          docker build -t gcr.io/deckhubapp/backend-cloud:${{ github.sha }} ./src/backend

      # Step 9: Push Docker image to GCR
      - name: Push Docker image to GCR
        run: |
          docker push gcr.io/deckhubapp/backend-cloud:${{ github.sha }}

      # Step 10: Deploy the backend to Google Cloud Run (staging)
      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy deckhub-backend-staging \
            --image gcr.io/deckhubapp/backend-cloud:${{ github.sha }} \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --set-env-vars "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" \
            --set-env-vars "LOCAL=False"

      - name: Echo staging URL
        run: echo "Find the staging URL here -> https://deckhubapp--staging-8dva1oxn.web.app/"
